<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Power Rankings</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'] },
                    colors: { dark: '#0f172a', card: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .custom-checkbox { width: 1.1rem; height: 1.1rem; border-radius: 0.25rem; }

        .loader {
            display: inline-block;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: currentColor;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tab-active {
            background-color: var(--accent-color, #ef4444);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 14px 0 rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Шапка -->
        <header class="glass-card p-6 flex flex-col md:flex-row justify-between items-center gap-6 border-b-4 transition-colors duration-500" id="mainHeader" style="border-color: #ef4444;">
            <div class="flex-1 w-full flex flex-col md:flex-row items-center md:items-start justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-3" id="pageTitle">
                        <svg class="w-8 h-8 transition-colors duration-500" id="pageIcon" style="color: #ef4444;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        <span>OG Power Rankings: Загрузка...</span>
                    </h1>
                </div>
                
                <div class="flex-shrink-0 flex items-center gap-2">
                    <button id="refreshBtn" onclick="loadData()" class="bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white px-5 py-2.5 rounded-lg font-bold text-sm transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <span>Обновить</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Навигация по вкладкам -->
        <div class="flex flex-wrap gap-2 justify-center md:justify-start" id="tabsContainer"></div>
        
        <!-- Легенда цветов (динамическая) -->
        <div id="colorLegend" class="flex flex-wrap gap-4 justify-center md:justify-start text-xs text-slate-300 bg-slate-800/50 p-3 rounded-lg border border-slate-700/50 w-full md:w-fit"></div>

        <!-- Ошибки -->
        <div id="errorMessage" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-lg" role="alert">
            <span id="errorText"></span>
        </div>

        <!-- Основной контент -->
        <main id="dashboardContent" class="grid grid-cols-1 lg:grid-cols-2 gap-6 opacity-0 transition-opacity duration-500">
            
            <!-- 1. Общий рейтинг -->
            <section id="overallSection" class="glass-card p-6 flex flex-col h-[550px] transition-all duration-500">
                <h2 class="text-xl font-bold mb-4 text-slate-100 flex items-center gap-2">
                    <span class="w-2 h-6 rounded-sm transition-colors duration-500" id="accentBar1" style="background-color: #ef4444;"></span> <span id="overallTitle">Общий рейтинг</span>
                </h2>
                <div class="flex-1 relative w-full h-full"><canvas id="overallChart"></canvas></div>
            </section>

            <!-- 2. Результаты по этапам -->
            <section id="raceSection" class="glass-card p-6 flex flex-col h-[550px] transition-all duration-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-slate-100 flex items-center gap-2">
                        <span class="w-2 h-6 rounded-sm transition-colors duration-500" id="accentBar2" style="background-color: #3b82f6;"></span> По этапам
                    </h2>
                    <select id="raceSelector" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1 text-sm text-white outline-none focus:ring-1"></select>
                </div>
                <div class="flex-1 relative w-full h-full flex justify-center items-center">
                    <canvas id="raceChart"></canvas>
                </div>
            </section>

            <!-- 3. Прогрессия (Скрывается для Dot и Rank) -->
            <section id="trendSection" class="glass-card p-6 flex flex-col h-[450px] transition-all duration-500">
                <div class="flex justify-between items-center mb-4 relative z-20">
                    <h2 class="text-xl font-bold text-slate-100 flex items-center gap-2">
                        <span class="w-2 h-6 bg-emerald-500 rounded-sm"></span> Прогрессия
                    </h2>
                    <div class="relative">
                        <button id="trendDropdownBtn" onclick="toggleTrendDriverSelect()" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white hover:bg-slate-700 flex items-center gap-2 transition-colors focus:outline-none focus:ring-1 focus:ring-emerald-500">
                            Выбор пилотов <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div id="trendDriverDropdown" class="hidden absolute right-0 mt-2 w-56 bg-slate-800 border border-slate-600 rounded-lg shadow-2xl max-h-64 overflow-y-auto p-2">
                        </div>
                    </div>
                </div>
                <div class="flex-1 relative w-full h-full"><canvas id="trendChart"></canvas></div>
            </section>

            <!-- 4. Радар (Скрывается для Dot и Rank) -->
            <section id="radarSection" class="glass-card p-6 flex flex-col h-[450px] transition-all duration-500">
                <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                    <h2 class="text-xl font-bold text-slate-100 flex items-center gap-2">
                        <span class="w-2 h-6 bg-purple-500 rounded-sm"></span> Сравнение (Лицом к лицу)
                    </h2>
                    <div class="flex gap-2">
                        <select id="driver1Selector" class="bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-xs text-white max-w-[120px] outline-none"></select>
                        <span class="text-slate-400 text-sm py-1">vs</span>
                        <select id="driver2Selector" class="bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-xs text-white max-w-[120px] outline-none"></select>
                    </div>
                </div>
                <div class="flex-1 relative w-full h-full"><canvas id="radarChart"></canvas></div>
            </section>

            <!-- 5. Таблица -->
            <section class="glass-card p-6 lg:col-span-2 flex flex-col min-h-[300px]">
                <h2 class="text-xl font-bold mb-4 text-slate-100 flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-sm"></span> Детальная статистика
                </h2>
                <div class="overflow-x-auto rounded-lg border border-slate-700/50">
                    <table class="w-full text-left text-sm text-slate-300 whitespace-nowrap">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-800/80 border-b border-slate-700">
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-700/50"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --------------------------------------------------------------------------------
        // КОНФИГУРАЦИЯ
        // --------------------------------------------------------------------------------
        const DATASETS = [
            { 
                id: 'races', 
                name: 'Гонки', 
                url: 'https://docs.google.com/spreadsheets/d/1Gz8rnrYxf7LjBI3sjih7VlulC0YDvc8AwvgiVbKtKZ8/gviz/tq?tqx=out:json&headers=1&sheet=Races', 
                colorHex: '#ef4444', 
                icon: 'M13 10V3L4 14h7v7l9-11h-7z'
            },
            { 
                id: 'quals', 
                name: 'Квалификации', 
                url: 'https://docs.google.com/spreadsheets/d/1Gz8rnrYxf7LjBI3sjih7VlulC0YDvc8AwvgiVbKtKZ8/gviz/tq?tqx=out:json&headers=1&sheet=Quals', 
                colorHex: '#3b82f6', 
                icon: 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z'
            },
            { 
                id: 'dotr', 
                name: 'Пилот гонки', 
                url: 'https://docs.google.com/spreadsheets/d/1Gz8rnrYxf7LjBI3sjih7VlulC0YDvc8AwvgiVbKtKZ8/gviz/tq?tqx=out:json&sheet=DotR&range=A3:Z&headers=1', 
                colorHex: '#10b981', 
                icon: 'M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z' 
            },
            { 
                id: 'dotq', 
                name: 'Пилот квалификации', 
                url: 'https://docs.google.com/spreadsheets/d/1Gz8rnrYxf7LjBI3sjih7VlulC0YDvc8AwvgiVbKtKZ8/gviz/tq?tqx=out:json&sheet=DotQ&range=A3:Z&headers=1', 
                colorHex: '#f59e0b', 
                icon: 'M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z' 
            },
            { 
                id: 'rankr', 
                name: 'Оценка гонок', 
                url: 'https://docs.google.com/spreadsheets/d/1Gz8rnrYxf7LjBI3sjih7VlulC0YDvc8AwvgiVbKtKZ8/gviz/tq?tqx=out:json&headers=1&range=A1:B&sheet=RankR', 
                colorHex: '#14b8a6', 
                icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' 
            },
            { 
                id: 'rankq', 
                name: 'Оценка квалификаций', 
                url: 'https://docs.google.com/spreadsheets/d/1Gz8rnrYxf7LjBI3sjih7VlulC0YDvc8AwvgiVbKtKZ8/gviz/tq?tqx=out:json&headers=1&range=A1:B&sheet=RankQ', 
                colorHex: '#a855f7', 
                icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' 
            }
        ];

        let currentDataset = DATASETS[0];
        let globalData = [];
        let columns = []; 
        let overallColName = "Итог"; 
        let trendSelectedDrivers = [];
        let sortCol = 'overall';
        let sortAsc = false;
        let isFetching = false;
        let charts = { overall: null, trend: null, race: null, radar: null };

        let globalMaxOverall = 0;
        let globalMaxByStage = {};

        const palette = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#14b8a6', '#f43f5e', '#84cc16', '#a855f7', '#0ea5e9', '#eab308', '#22c55e', '#f97316', '#6366f1', '#10b981', '#fbbf24', '#f87171', '#38bdf8'];

        // --------------------------------------------------------------------------------
        // ЦВЕТОВАЯ ЛОГИКА
        // --------------------------------------------------------------------------------
        function getColor(score, maxValue = 10) {
            if (score === null || score === undefined) return 'rgba(71, 85, 105, 0.5)';
            const num = Number(score);
            if (isNaN(num)) return 'rgba(71, 85, 105, 0.5)';

            // Для DotR / DotQ (Относительно лидера этапа)
            if (['dotr', 'dotq'].includes(currentDataset.id)) {
                if (maxValue === 0 || num === 0) return 'rgba(239, 68, 68, 0.8)'; 
                const percentageOfLeader = (num / maxValue) * 100;
                if (percentageOfLeader > 80) return 'rgba(16, 185, 129, 0.8)'; 
                if (percentageOfLeader > 50) return 'rgba(59, 130, 246, 0.8)'; 
                return 'rgba(245, 158, 11, 0.8)'; 
            }
            
            // Для RankQ / RankR (Абсолютные проценты, как в гонках, но x10)
            if (['rankq', 'rankr'].includes(currentDataset.id)) {
                if (num >= 85) return 'rgba(16, 185, 129, 0.8)'; 
                if (num >= 65) return 'rgba(59, 130, 246, 0.8)'; 
                if (num >= 50) return 'rgba(245, 158, 11, 0.8)'; 
                return 'rgba(239, 68, 68, 0.8)'; 
            }

            // Для Races / Quals (От 0 до 10)
            if (num >= 8.5) return 'rgba(16, 185, 129, 0.8)'; 
            if (num >= 6.5) return 'rgba(59, 130, 246, 0.8)'; 
            if (num >= 5.0) return 'rgba(245, 158, 11, 0.8)'; 
            return 'rgba(239, 68, 68, 0.8)'; 
        }

        function getTextColor(score, maxValue = 10) {
            if (score === null || score === undefined || score === '') return 'text-slate-500';
            const num = Number(score);
            if (isNaN(num)) return 'text-slate-500';

            if (['dotr', 'dotq'].includes(currentDataset.id)) {
                if (maxValue === 0 || num === 0) return 'text-red-400';
                const percentageOfLeader = (num / maxValue) * 100;
                if (percentageOfLeader > 80) return 'text-emerald-400';
                if (percentageOfLeader > 50) return 'text-blue-400';
                return 'text-yellow-400';
            }

            if (['rankq', 'rankr'].includes(currentDataset.id)) {
                if (num >= 85) return 'text-emerald-400';
                if (num >= 65) return 'text-blue-400';
                if (num >= 50) return 'text-yellow-400';
                return 'text-red-400';
            }

            if (num >= 8.5) return 'text-emerald-400';
            if (num >= 6.5) return 'text-blue-400';
            if (num >= 5.0) return 'text-yellow-400';
            return 'text-red-400';
        }

        // --------------------------------------------------------------------------------
        // УПРАВЛЕНИЕ ИНТЕРФЕЙСОМ И ВКЛАДКАМИ
        // --------------------------------------------------------------------------------
        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            DATASETS.forEach(ds => {
                const isActive = (ds.id === currentDataset.id);
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-lg font-medium text-sm transition-all duration-300 border focus:outline-none flex items-center gap-2 ${
                    isActive ? 'tab-active' : 'bg-slate-800 border-slate-600 text-slate-300 hover:bg-slate-700'
                }`;
                btn.onclick = () => switchDataset(ds.id);
                if(isActive) btn.style.setProperty('--accent-color', ds.colorHex);
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${ds.icon}"></path></svg>${ds.name}`;
                container.appendChild(btn);
            });
        }

        function updateUITheme() {
            document.getElementById('pageTitle').querySelector('span').innerText = `OG Power Rankings: ${currentDataset.name}`;
            document.getElementById('pageIcon').style.color = currentDataset.colorHex;
            document.getElementById('pageIcon').innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${currentDataset.icon}"></path>`;
            document.getElementById('mainHeader').style.borderColor = currentDataset.colorHex;
            document.getElementById('accentBar1').style.backgroundColor = currentDataset.colorHex;
            document.getElementById('accentBar2').style.backgroundColor = currentDataset.colorHex;

            const overallTitle = document.getElementById('overallTitle');
            if (['rankq', 'rankr'].includes(currentDataset.id)) {
                overallTitle.innerText = 'Общие оценки (Столбчатая диаграмма)';
            } else {
                overallTitle.innerText = 'Общий рейтинг';
            }

            // Обновление легенды
            const legendContainer = document.getElementById('colorLegend');
            if (['races', 'quals'].includes(currentDataset.id)) {
                legendContainer.innerHTML = `
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> ≥ 8.5</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-500"></span> 6.5 – 8.4</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-yellow-500"></span> 5.0 – 6.4</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-red-500"></span> < 5.0</div>
                `;
            } else if (['rankq', 'rankr'].includes(currentDataset.id)) {
                legendContainer.innerHTML = `
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> ≥ 85%</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-500"></span> 65% – 84%</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-yellow-500"></span> 50% – 64%</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-red-500"></span> < 50%</div>
                `;
            } else if (['dotr', 'dotq'].includes(currentDataset.id)) {
                legendContainer.innerHTML = `
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> > 80% от лидера</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-500"></span> 51% – 80% от лидера</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-yellow-500"></span> 1% – 50% от лидера</div>
                    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-red-500"></span> 0%</div>
                `;
            }
        }

        function switchDataset(id) {
            if (isFetching || currentDataset.id === id) return;
            const selected = DATASETS.find(ds => ds.id === id);
            if(selected) {
                currentDataset = selected;
                renderTabs();
                updateUITheme();
                sortCol = 'overall';
                sortAsc = false;
                trendSelectedDrivers = []; 
                document.getElementById('dashboardContent').classList.add('opacity-0');
                loadData();
            }
        }

        // --------------------------------------------------------------------------------
        // ЗАГРУЗКА И ПАРСИНГ
        // --------------------------------------------------------------------------------
        window.google = {
            visualization: {
                Query: {
                    setResponse: function(jsonObj) {
                        const btn = document.getElementById('refreshBtn');
                        const btnText = btn.querySelector('span');
                        const dashboard = document.getElementById('dashboardContent');

                        if (jsonObj.status === 'error') {
                            showError("Ошибка Google API: " + (jsonObj.errors[0]?.message || "Неизвестная ошибка"));
                            resetFetchState(btn, btnText);
                            return;
                        }

                        if (!jsonObj.table || !jsonObj.table.rows) {
                            showError("Данные таблицы недоступны.");
                            resetFetchState(btn, btnText);
                            return;
                        }

                        try {
                            parseGoogleJSON(jsonObj.table);
                            initDashboard();
                            dashboard.classList.remove('opacity-0');
                        } catch (e) {
                            showError("Ошибка обработки данных: " + e.message);
                            console.error(e);
                        } finally {
                            resetFetchState(btn, btnText);
                        }
                    }
                }
            }
        };

        function resetFetchState(btn, btnText) {
            isFetching = false;
            if (btn) btn.disabled = false;
            if (btnText) btnText.innerHTML = 'Обновить';
            
            // Восстанавливаем иконку, если она скрывалась
            if (btn) {
                const icon = btn.querySelector('svg.w-4.h-4');
                if (icon) icon.classList.remove('hidden');
            }
        }

        function showError(msg) {
            document.getElementById('errorText').innerText = msg;
            document.getElementById('errorMessage').classList.remove('hidden');
        }

        function loadData() {
            if(isFetching) return;
            isFetching = true;
            const btn = document.getElementById('refreshBtn');
            const btnText = btn.querySelector('span');
            document.getElementById('errorMessage').classList.add('hidden');
            btn.disabled = true;
            
            // Прячем SVG иконку при загрузке
            const icon = btn.querySelector('svg.w-4.h-4');
            if (icon) icon.classList.add('hidden');
            
            // Используем span и flexbox для центрирования на одной строке
            btnText.innerHTML = '<span class="flex items-center gap-2"><span class="loader" style="border-left-color: transparent; border-top-color: white;"></span> Загрузка...</span>';
            
            const script = document.createElement('script');
            script.src = `${currentDataset.url}&_t=${new Date().getTime()}`;
            script.onerror = () => {
                showError("Ошибка подключения. Проверьте интернет или доступ к таблице.");
                resetFetchState(btn, btnText);
            };
            script.onload = () => script.remove();
            document.body.appendChild(script);
        }

        function parseGoogleJSON(table) {
            columns = [];
            let colOffsets = [];
            
            const parseVal = (cell) => {
                if (!cell) return null;
                if (typeof cell.v === 'number') return cell.v;
                let val = cell.v !== null ? cell.v : cell.f;
                if (val === null || val === undefined || val === "") return null;
                let str = val.toString().replace(/%/g, '').replace(/,/g, '.').replace(/\s/g, '').trim();
                if (str === "") return null;
                let num = parseFloat(str);
                return isNaN(num) ? null : num;
            };

            overallColName = (table.cols[1] && table.cols[1].label) ? table.cols[1].label.split('\n')[0].trim() : "Оценка";
            
            for (let i = 2; i < table.cols.length; i++) {
                let label = table.cols[i] ? table.cols[i].label.split('\n')[0].trim() : "";
                if (label !== "") {
                    let uniqueLabel = label;
                    let counter = 2;
                    while (columns.includes(uniqueLabel)) {
                        uniqueLabel = `${label} (${counter})`;
                        counter++;
                    }
                    columns.push(uniqueLabel);
                    colOffsets.push(i);
                }
            }

            let data = [];
            table.rows.forEach(r => {
                if (!r.c || !r.c[0]) return;
                let name = r.c[0].v ? r.c[0].v.toString().trim() : (r.c[0].f ? r.c[0].f.toString().trim() : "");
                if (!name || ["From", "To", "Среднее", "Rating", "Driver", "Пилот"].includes(name)) return;

                let overall = parseVal(r.c[1]);
                let events = {};
                columns.forEach((col, idx) => {
                    events[col] = parseVal(r.c[colOffsets[idx]]);
                });

                data.push({ driver: name, overall, events });
            });

            globalData = data.sort((a, b) => (b.overall || 0) - (a.overall || 0));

            globalMaxOverall = Math.max(...globalData.map(d => d.overall || 0));
            globalMaxByStage = {};
            columns.forEach(col => {
                globalMaxByStage[col] = Math.max(...globalData.map(d => d.events[col] || 0));
            });
        }

        // --------------------------------------------------------------------------------
        // ОТРИСОВКА
        // --------------------------------------------------------------------------------
        function initDashboard() {
            const isDot = ['dotr', 'dotq'].includes(currentDataset.id);
            const isRank = ['rankq', 'rankr'].includes(currentDataset.id);

            const trendSection = document.getElementById('trendSection');
            const radarSection = document.getElementById('radarSection');
            const overallSection = document.getElementById('overallSection');
            const raceSection = document.getElementById('raceSection');
            
            if (isRank) {
                trendSection.classList.add('hidden');
                radarSection.classList.add('hidden');
                raceSection.classList.add('hidden');
                overallSection.classList.add('lg:col-span-2');
                overallSection.classList.remove('h-[550px]');
                overallSection.classList.add('h-[650px]');
            } else if (isDot) {
                trendSection.classList.add('hidden');
                radarSection.classList.add('hidden');
                raceSection.classList.remove('hidden');
                overallSection.classList.add('lg:col-span-2');
                raceSection.classList.add('lg:col-span-2');
                overallSection.classList.add('h-[550px]');
                overallSection.classList.remove('h-[650px]');
            } else {
                trendSection.classList.remove('hidden');
                radarSection.classList.remove('hidden');
                raceSection.classList.remove('hidden');
                overallSection.classList.remove('lg:col-span-2');
                raceSection.classList.remove('lg:col-span-2');
                overallSection.classList.add('h-[550px]');
                overallSection.classList.remove('h-[650px]');
                setupTrendTab();
                setupRadarTab();
            }

            drawOverall();
            if (!isRank) {
                setupRaceTab();
            }
            drawTable();
        }

        function drawOverall() {
            if (charts.overall) charts.overall.destroy();
            const ctx = document.getElementById('overallChart').getContext('2d');
            const isRank = ['rankq', 'rankr'].includes(currentDataset.id);

            charts.overall = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: globalData.map(x => x.driver),
                    datasets: [{
                        label: overallColName,
                        data: globalData.map(x => x.overall),
                        backgroundColor: globalData.map(x => getColor(x.overall, globalMaxOverall)),
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (c) => {
                                    let suffix = isRank ? '%' : '';
                                    return ` ${c.dataset.label}: ${c.parsed.x.toFixed(2)}${suffix}`;
                                }
                            }
                        }
                    },
                    scales: { 
                        x: { min: 0, grid: { color: 'rgba(51, 65, 85, 0.3)' } },
                        y: { grid: { display: false }, ticks: { color: '#e2e8f0', autoSkip: false } }
                    }
                }
            });
        }

        function setupRaceTab() {
            const sel = document.getElementById('raceSelector');
            sel.innerHTML = '';
            columns.forEach(c => sel.add(new Option(c, c)));
            sel.onchange = () => drawRace(sel.value);
            if (columns.length > 0) drawRace(columns[0]);
        }

        function drawRace(eventCol) {
            if (charts.race) charts.race.destroy();
            const ctx = document.getElementById('raceChart').getContext('2d');
            const isDot = ['dotr', 'dotq'].includes(currentDataset.id);
            const currentMax = globalMaxByStage[eventCol] || 0;
            
            let locData = [...globalData].filter(d => d.events[eventCol] !== null && !isNaN(d.events[eventCol]));
            if (isDot) locData = locData.filter(d => d.events[eventCol] > 0);
            locData.sort((a, b) => b.events[eventCol] - a.events[eventCol]);

            let bgColors = isDot 
                ? locData.map(x => palette[globalData.findIndex(d => d.driver === x.driver) % palette.length])
                : locData.map(x => getColor(x.events[eventCol], currentMax));

            const chartOptions = {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: isDot ? { position: 'right', labels: { color: '#e2e8f0', boxWidth: 12, padding: 10, font: { size: 11 } } } : { display: false },
                    tooltip: { 
                        callbacks: { 
                            label: (c) => {
                                if (isDot) return ` ${c.label}: ${c.parsed.toFixed(2)} (от лидера: ${((c.parsed/(currentMax || 1))*100).toFixed(1)}%)`;
                                return ` ${c.dataset.label}: ${c.parsed.y.toFixed(2)}`;
                            } 
                        } 
                    }
                }
            };

            if (!isDot) {
                chartOptions.scales = {
                    y: { min: 0, grid: { color: 'rgba(51, 65, 85, 0.3)' } },
                    x: { grid: { display: false }, ticks: { maxRotation: 45, minRotation: 45, autoSkip: false } }
                };
            }

            charts.race = new Chart(ctx, {
                type: isDot ? 'pie' : 'bar',
                data: {
                    labels: locData.map(x => x.driver),
                    datasets: [{
                        label: eventCol,
                        data: locData.map(x => x.events[eventCol]),
                        backgroundColor: bgColors,
                        ...(isDot ? { borderColor: '#1e293b', borderWidth: 2, hoverOffset: 5 } : { borderRadius: {topLeft: 6, topRight: 6} })
                    }]
                },
                options: chartOptions
            });
        }

        function setupTrendTab() {
            if(trendSelectedDrivers.length === 0) {
                trendSelectedDrivers = [...globalData].sort((a, b) => a.driver.localeCompare(b.driver)).slice(0, 3).map(d => d.driver);
            }
            const dropdown = document.getElementById('trendDriverDropdown');
            dropdown.innerHTML = '';
            [...globalData].sort((a, b) => a.driver.localeCompare(b.driver)).forEach(d => {
                const isChecked = trendSelectedDrivers.includes(d.driver) ? 'checked' : '';
                dropdown.innerHTML += `<label class="flex items-center gap-3 p-2 hover:bg-slate-700 rounded-md cursor-pointer text-sm text-slate-300"><input type="checkbox" value="${d.driver}" ${isChecked} class="custom-checkbox accent-emerald-500" onchange="updateTrendDrivers(this)"><span class="truncate">${d.driver}</span></label>`;
            });
            drawTrend();
        }

        function toggleTrendDriverSelect() { document.getElementById('trendDriverDropdown').classList.toggle('hidden'); }
        function updateTrendDrivers(checkbox) {
            if (checkbox.checked) trendSelectedDrivers.push(checkbox.value);
            else trendSelectedDrivers = trendSelectedDrivers.filter(d => d !== checkbox.value);
            drawTrend();
        }

        function drawTrend() {
            if (charts.trend) charts.trend.destroy();
            const dataToPlot = globalData.filter(d => trendSelectedDrivers.includes(d.driver));
            const datasets = dataToPlot.map(drv => {
                const color = palette[globalData.findIndex(d => d.driver === drv.driver) % palette.length];
                return { label: drv.driver, data: columns.map(col => drv.events[col]), borderColor: color, backgroundColor: color, tension: 0.3, borderWidth: 2, pointRadius: 4, spanGaps: true };
            });
            charts.trend = new Chart(document.getElementById('trendChart').getContext('2d'), {
                type: 'line', data: { labels: columns, datasets: datasets },
                options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: { position: 'top', labels: { boxWidth: 12, color: '#e2e8f0', usePointStyle: true, pointStyle: 'circle' } } }, scales: { y: { min: 0, grid: { color: 'rgba(51, 65, 85, 0.3)' } }, x: { grid: { color: 'rgba(51, 65, 85, 0.3)' } } } }
            });
        }

        function setupRadarTab() {
            const s1 = document.getElementById('driver1Selector'), s2 = document.getElementById('driver2Selector');
            const prev1 = s1.value, prev2 = s2.value;
            s1.innerHTML = ''; s2.innerHTML = '';
            const sorted = [...globalData].sort((a, b) => a.driver.localeCompare(b.driver));
            sorted.forEach(d => { s1.add(new Option(d.driver, d.driver)); s2.add(new Option(d.driver, d.driver)); });
            if(prev1 && sorted.find(d => d.driver === prev1)) s1.value = prev1;
            if(prev2 && sorted.find(d => d.driver === prev2)) s2.value = prev2; else if (sorted.length > 1) s2.selectedIndex = 1;
            const update = () => drawRadar(s1.value, s2.value);
            s1.onchange = update; s2.onchange = update; update();
        }

        function drawRadar(d1Name, d2Name) {
            if (charts.radar) charts.radar.destroy();
            const drv1 = globalData.find(d => d.driver === d1Name), drv2 = globalData.find(d => d.driver === d2Name);
            const p1Color = currentDataset.colorHex;
            charts.radar = new Chart(document.getElementById('radarChart').getContext('2d'), {
                type: 'radar',
                data: {
                    labels: columns,
                    datasets: [
                        { label: drv1 ? drv1.driver : 'N/A', data: drv1 ? columns.map(c => drv1.events[c]) : [], borderColor: p1Color, backgroundColor: `${p1Color}33`, pointBackgroundColor: p1Color, borderWidth: 2 },
                        { label: drv2 ? drv2.driver : 'N/A', data: drv2 ? columns.map(c => drv2.events[c]) : [], borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.2)', pointBackgroundColor: '#8b5cf6', borderWidth: 2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 10, angleLines: { color: 'rgba(255, 255, 255, 0.1)' }, grid: { color: 'rgba(255, 255, 255, 0.1)' }, pointLabels: { color: '#cbd5e1', font: { size: 12 } }, ticks: { display: false } } }, plugins: { legend: { position: 'top', labels: { color: '#e2e8f0' } } } }
            });
        }

        function sortTable(col) {
            if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = false; }
            drawTable();
        }

        function getSortIcon(col) {
            if (sortCol !== col) return '<span class="text-slate-600 ml-1 text-xs opacity-0 group-hover:opacity-100">↕</span>';
            return `<span class="ml-1 text-xs" style="color: ${currentDataset.colorHex};">${sortAsc ? '↑' : '↓'}</span>`;
        }

        function drawTable() {
            let firstColName = ['rankq', 'rankr'].includes(currentDataset.id) ? 'Этап' : 'Пилот';
            const suffix = ['rankq', 'rankr'].includes(currentDataset.id) ? '%' : '';

            let hHtml = `<th class="px-4 py-3 cursor-pointer hover:bg-slate-700 select-none group" onclick="sortTable('driver')">${firstColName} ${getSortIcon('driver')}</th><th class="px-4 py-3 text-center bg-slate-800/80 text-white cursor-pointer hover:bg-slate-700 select-none group" onclick="sortTable('overall')">${overallColName} ${getSortIcon('overall')}</th>`;
            columns.forEach(c => hHtml += `<th class="px-4 py-3 text-center cursor-pointer hover:bg-slate-700 select-none group" onclick="sortTable('${c}')">${c} ${getSortIcon(c)}</th>`);
            document.getElementById('tableHeader').innerHTML = hHtml + `<th class="px-4 py-3 border-l border-slate-700 border-opacity-50"></th>`;

            let tableData = [...globalData].sort((a, b) => {
                let vA = (sortCol === 'driver') ? a.driver : (sortCol === 'overall' ? a.overall : a.events[sortCol]);
                let vB = (sortCol === 'driver') ? b.driver : (sortCol === 'overall' ? b.overall : b.events[sortCol]);
                if (vA === null) vA = sortAsc ? Infinity : -Infinity;
                if (vB === null) vB = sortAsc ? Infinity : -Infinity;
                return (vA < vB) ? (sortAsc ? -1 : 1) : (vA > vB ? (sortAsc ? 1 : -1) : 0);
            });

            let bHtml = '';
            tableData.forEach((d, i) => {
                let rHtml = `<tr class="hover:bg-slate-800/80 transition-colors"><td class="px-4 py-2 font-medium text-white flex items-center gap-3"><span class="text-slate-500 w-4 text-xs text-right">${i + 1}.</span> ${d.driver}</td><td class="px-4 py-2 text-center bg-slate-800/30"><span class="font-bold ${getTextColor(d.overall, globalMaxOverall)}">${d.overall !== null ? d.overall.toFixed(2) + suffix : '-'}</span></td>`;
                columns.forEach(c => { 
                    let v = d.events[c]; 
                    let stageMax = globalMaxByStage[c] || 0;
                    rHtml += `<td class="px-4 py-2 text-center text-sm"><span class="${v !== null ? getTextColor(v, stageMax) + ' font-semibold' : 'text-slate-600'}">${v !== null ? v.toFixed(2) + suffix : '-'}</span></td>`; 
                });
                bHtml += rHtml + `<td class="border-l border-slate-700 border-opacity-50"></td></tr>`;
            });
            document.getElementById('tableBody').innerHTML = bHtml;
        }

        window.onload = () => { renderTabs(); updateUITheme(); loadData(); };
        document.addEventListener('click', (e) => { 
            const dropdown = document.getElementById('trendDriverDropdown');
            const btn = document.getElementById('trendDropdownBtn');
            if (dropdown && btn && !dropdown.contains(e.target) && !btn.contains(e.target)) dropdown.classList.add('hidden'); 
        });
    </script>
</body>
